services:
  - type: web
    name: spendbot-api
    runtime: python
    rootDir: app
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false       # set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: GSHEET_NAME
        value: SpendBot
      - key: GSHEET_CREDS
        sync: false       # paste full JSON string in Render dashboard